<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>MonadicWorkspace</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1e1e1e;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-app-region: no-drag;
    }

    /* ── Activity Bar (sinistra, 48px) ── */
    .activity-bar {
      position: fixed;
      left: 0;
      top: 0;
      width: 48px;
      height: 100vh;
      background: #333333;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0;
      z-index: 100;
      user-select: none;
      -webkit-app-region: drag;
    }

    /* Logo in cima */
    .activity-logo {
      width: 32px;
      height: 32px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: no-drag;
      flex-shrink: 0;
    }

    .activity-logo svg { width: 22px; height: 22px; }

    /* Icone principali */
    .activity-icons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex: 1;
      -webkit-app-region: no-drag;
    }

    /* Icone in fondo */
    .activity-bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding-bottom: 8px;
      -webkit-app-region: no-drag;
    }

    .activity-item {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      color: #858585;
      transition: color 0.1s;
      border-left: 2px solid transparent;
    }

    .activity-item:hover { color: #cccccc; }

    .activity-item.active {
      color: #ffffff;
      border-left-color: #ffffff;
    }

    .activity-item svg { width: 24px; height: 24px; }

    /* Tooltip */
    .activity-item::after {
      content: attr(data-tooltip);
      position: absolute;
      left: 54px;
      top: 50%;
      transform: translateY(-50%);
      background: #1f1f1f;
      color: #cccccc;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      border: 1px solid #3c3c3c;
      z-index: 200;
    }

    .activity-item:hover::after { opacity: 1; }

    /* Separatore */
    .activity-sep {
      width: 24px;
      height: 1px;
      background: #484848;
      margin: 6px 0;
    }

    /* Dot di stato per i servizi */
    .status-dot {
      position: absolute;
      bottom: 8px;
      right: 8px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #3c3c3c;
    }

    .status-dot.online { background: #3fb950; }
  </style>
</head>
<body>

<div class="activity-bar">

  <!-- Logo MonadicSharp -->
  <div class="activity-logo">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="10" fill="#0d1117" stroke="#00ff88" stroke-width="1.5"/>
      <path d="M7 16 L7 8 L10.5 13 L12 10.5 L13.5 13 L17 8 L17 16" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
  </div>

  <!-- Icone principali (view) -->
  <div class="activity-icons">

    <!-- Studio (default) -->
    <div class="activity-item active" data-index="0" data-tooltip="MonadicStudio" onclick="switchView(0, this)">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/>
      </svg>
      <div class="status-dot online" id="dot-0"></div>
    </div>

    <!-- Planner -->
    <div class="activity-item" data-index="1" data-tooltip="MonadicPlanner" onclick="switchView(1, this)">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/>
      </svg>
      <div class="status-dot online" id="dot-1"></div>
    </div>

    <!-- Dashboard -->
    <div class="activity-item" data-index="2" data-tooltip="MonadicDashboard" onclick="switchView(2, this)">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>
      </svg>
      <div class="status-dot online" id="dot-2"></div>
    </div>

    <div class="activity-sep"></div>

    <!-- Git -->
    <div class="activity-item" data-tooltip="Source Control" onclick="openExternal('https://github.com/Danny4897')">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
      </svg>
    </div>

    <!-- NuGet/Packages -->
    <div class="activity-item" data-tooltip="MonadicSharp NuGet" onclick="openExternal('https://www.nuget.org/profiles/Danny4897')">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
      </svg>
    </div>

  </div>

  <!-- Icone in fondo -->
  <div class="activity-bottom">

    <!-- MonadicAgent CLI -->
    <div class="activity-item" data-tooltip="MonadicAgent CLI" onclick="switchView(3, this)">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h16v12zM6 10l1.41-1.41L10 11.17l6.59-6.58L18 6l-8 8-4-4z"/>
      </svg>
    </div>

    <!-- Settings -->
    <div class="activity-item" data-tooltip="Impostazioni" onclick="openSettings()">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
      </svg>
    </div>

  </div>
</div>

<script>
  let activeIndex = 0

  function switchView(index, el) {
    document.querySelectorAll('.activity-item[data-index]').forEach(i => i.classList.remove('active'))
    if (el) el.classList.add('active')
    activeIndex = index
    if (window.monadicApp) window.monadicApp.switchView(index)
  }

  function openExternal(url) {
    if (window.monadicApp) window.monadicApp.openExternal(url)
  }

  function openSettings() {
    // futuro
  }
</script>

</body>
</html>
